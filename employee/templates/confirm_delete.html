{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</h4>
            </div>
            <div class="card-body p-4 text-center">
                <i class="bi bi-trash3 display-1 text-danger mb-3 d-block"></i>
                <h5>Are you sure you want to delete this employee?</h5>
                <p class="text-muted mb-4">
                    <strong>{{ employee.ename }}</strong> (ID: {{ employee.eid }})
                </p>
                <form method="POST" action="/delete/{{ employee.id }}">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-center">
                        <a href="/show" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
