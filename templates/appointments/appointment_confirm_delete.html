{% extends 'base.html' %}
{% block title %}Delete Appointment - HMS{% endblock %}
{% block content %}
<h2>Delete Appointment</h2>
<p>Are you sure you want to delete appointment #{{ object.id }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'appointment_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
