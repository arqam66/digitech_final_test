{% extends 'base.html' %}
{% block title %}Delete Doctor - HMS{% endblock %}
{% block content %}
<h2>Delete Doctor</h2>
<p>Are you sure you want to delete "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'doctor_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
